<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> - Ultimate Hip-Hop Hub v1.0 - </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --gold: #ffd700; --red: #ff4500; --pink: #f06292; --gray: #888; --green: #2ecc71; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; transition: 0.5s; overflow-x: hidden; position: relative; }
        
        /* MENU - Ajustado a 3 columnas y centrado */
        #menu { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            width: 95%; 
            max-width: 1000px; 
            padding: 20px;
            margin: auto; /* Centrado absoluto */
            padding-bottom: 60px; /* Espacio para la marca de agua */
        }

        .card { background: #151515; border: 1px solid #333; border-radius: 12px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); background: #222; }
        .card i { font-size: 2.5rem; margin-bottom: 10px; display: block; }
        .card h3 { margin: 10px 0 5px 0; font-size: 1.1rem; }

        /* PLAYER */
        #player { display: none; width: 90%; max-width: 400px; background: #000; padding: 25px; border-radius: 20px; border: 2px solid #333; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transition: transform 0.3s ease; }
        .btn-back { position: absolute; top: -45px; left: 0; background: #222; border: 1px solid #444; color: #fff; cursor: pointer; padding: 8px 15px; border-radius: 5px; font-size: 0.8rem; }
        
        .cover-box { width: 100%; aspect-ratio: 1/1; background: #111; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
        #cover { width: 100%; height: 100%; object-fit: cover; }
        
        /* BARRA DE PROGRESO */
        .progress-container { width: 100%; margin-bottom: 20px; }
        #seek-bar { width: 100%; cursor: pointer; accent-color: white; height: 5px; }

        .info { text-align: center; margin-bottom: 20px; min-height: 50px; }
        #title { font-weight: bold; font-size: 1rem; display: block; margin-bottom: 5px; color: #fff; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #album { font-size: 0.8rem; color: #666; display: block; margin-bottom: 10px; }
        
        /* Nuevo texto solicitado */
        .know-now { font-size: 0.7rem; color: rgba(255,255,255,0.6); font-style: italic; letter-spacing: 1px; }

        .controls { display: flex; justify-content: space-around; gap: 10px; align-items: center; }
        .controls button { background: #1a1a1a; border: 1px solid #333; color: white; padding: 15px; border-radius: 50%; cursor: pointer; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .controls button:active { transform: scale(0.9); background: #222; }
        .btn-play { width: 75px !important; height: 75px !important; background: #333 !important; font-size: 1.5rem; }

        .vol-container { margin-top: 25px; display: flex; align-items: center; gap: 10px; color: #666; font-size: 0.8rem; }
        #vol { flex: 1; accent-color: #555; cursor: pointer; }

        /* Marca de agua solicitada */
        .watermark { position: fixed; bottom: 15px; right: 20px; font-size: 0.65rem; color: rgba(255,255,255,0.2); letter-spacing: 2px; text-transform: uppercase; z-index: 10; pointer-events: none; }

        /* TEMAS */
        .theme-strictly { border-color: var(--red) !important; }
        .theme-strictly #seek-bar { accent-color: var(--red); }
        .theme-mixtapes { border-color: var(--gold) !important; }
        .theme-mixtapes #seek-bar { accent-color: var(--gold); }
        .theme-rnb { border-color: var(--pink) !important; }
        .theme-rnb #seek-bar { accent-color: var(--pink); }
        .theme-dancehall { border-color: var(--green) !important; }
        .theme-dancehall #seek-bar { accent-color: var(--green); }

        .hidden { display: none !important; }

        /* Responsivo para móviles */
        @media (max-width: 768px) { 
            #menu { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; } 
            .card { padding: 15px; }
            .card i { font-size: 2rem; }
            .card h3 { font-size: 1rem; }
        }
        
        /* Ajustes específicos para el reproductor en móvil (más pequeño) */
        @media (max-width: 480px) { 
            #menu { grid-template-columns: 1fr; } 
            
            #player { padding: 15px; max-width: 300px; border-radius: 15px; }
            .cover-box { margin-bottom: 10px; }
            .info { margin-bottom: 15px; min-height: 40px; }
            #title { font-size: 0.85rem; }
            #album { font-size: 0.7rem; margin-bottom: 5px; }
            .know-now { font-size: 0.6rem; }
            
            .controls { gap: 5px; }
            .controls button { width: 40px; height: 40px; padding: 10px; font-size: 0.8rem; }
            .btn-play { width: 55px !important; height: 55px !important; font-size: 1.1rem; }
            
            .vol-container { margin-top: 15px; font-size: 0.7rem; }
            .btn-back { top: -40px; padding: 5px 10px; font-size: 0.7rem; }
        }
    </style>
</head>

            playNext();

async function playNext() {
    document.getElementById('title').innerText = "CONECTANDO...";
    let id = "";
    try {
        if (currentMode === 'mixtapes') {
            const r = await fetch(`https://archive.org/advancedsearch.php?q=collection:(hiphopmixtapes)&fl[]=identifier&rows=20&page=${Math.floor(Math.random()*100)+1}&output=json`);
            const j = await r.json();
            id = j.response.docs[Math.floor(Math.random()*j.response.docs.length)].identifier;
        } else {
            const l = DB[currentMode];
            id = l[Math.floor(Math.random()*l.length)];
        }

        const res = await fetch(`https://archive.org/metadata/${id}`);
        const data = await res.json();

        if (!data.files || data.files.length > 150) {
            console.warn("Álbum demasiado pesado o corrupto, saltando...");
            return playNext();
        }

        const mp3s = data.files.filter(f => 
            f.name.toLowerCase().endsWith('.mp3') && 
            !f.name.toLowerCase().includes('vbr')
        );

        if (!mp3s.length) throw "No hay MP3s";

        const track = mp3s[Math.floor(Math.random()*mp3s.length)];
        const trackData = {
            title: (track.title || track.name).toUpperCase().replace(/_/g, ' ').replace('.MP3', ''),
            album: (data.metadata.title || "Archive Radio").toUpperCase(),
            url: `https://archive.org/download/${id}/${encodeURIComponent(track.name)}`,
            cover: `https://archive.org/services/img/${id}`
        };

        history.push(trackData); 
        historyIndex = history.length - 1;
        applyTrack(trackData);
    } catch (e) { 
        console.error("Error cargando track:", e);
        playNext(); 
    }
}
        function applyTrack(t) {
            document.getElementById('title').innerText = t.title;
            document.getElementById('album').innerText = t.album;
            document.getElementById('cover').src = t.cover;
            audio.src = t.url;
            audio.play().catch(() => pIcon.className = "fas fa-play");
            pIcon.className = "fas fa-pause";
            seekBar.value = 0;
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                seekBar.max = Math.floor(audio.duration);
                seekBar.value = Math.floor(audio.currentTime);
            }
        };

        seekBar.oninput = () => { audio.currentTime = seekBar.value; };

        function toggle() {
            if (audio.paused) { audio.play(); pIcon.className = "fas fa-pause"; }
            else { audio.pause(); pIcon.className = "fas fa-play"; }
        }

        function playPrev() { if (historyIndex > 0) applyTrack(history[--historyIndex]); }
        document.getElementById('vol').oninput = (e) => audio.volume = e.target.value;
        audio.onended = playNext;
        audio.onerror = playNext;
    </script>
